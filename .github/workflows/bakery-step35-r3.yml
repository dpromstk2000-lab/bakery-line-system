name: One-time Bakery STEP 35 R3 direct replacement

on:
  push:
    paths:
      - '.github/workflows/bakery-step35-r3.yml'

permissions:
  contents: write

jobs:
  replace-owner-toggle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace owner toggle controller directly
        shell: python
        run: |
          from pathlib import Path
          import base64
          import re

          js_path = Path("owner-wallet-mode.js")
          owner_path = Path("owner.html")
          old_workflow = Path(".github/workflows/bakery-step35-r2.yml")
          this_workflow = Path(".github/workflows/bakery-step35-r3.yml")

          corrected = base64.b64decode("").decode("utf-8")
          owner = owner_path.read_text(encoding="utf-8")

          owner, count = re.subn(
              r'<script src="\./owner-wallet-mode\.js\?v=[^"]+"></script>',
              '<script src="./owner-wallet-mode.js?v=35-r3"></script>',
              owner,
              count=1
          )
          if count != 1:
              raise SystemExit(f"owner script tag replacement failed: {count}")

          checks = {
              "R2 controller": "STEP BAKERY-35-R2" in corrected,
              "dirty state": "toggleDirty: false" in corrected,
              "manual state preserved": "if (toggle && !state.toggleDirty)" in corrected,
              "unsaved notice": "まだ保存されていません" in corrected,
              "cache version": 'owner-wallet-mode.js?v=35-r3' in owner,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit("validation failed: " + ", ".join(failed))

          js_path.write_text(corrected, encoding="utf-8")
          owner_path.write_text(owner, encoding="utf-8")
          old_workflow.unlink(missing_ok=True)
          this_workflow.unlink(missing_ok=True)

      - name: JavaScript syntax check
        run: node --check owner-wallet-mode.js

      - name: Commit STEP BAKERY-35-R3
        run: |
          git config user.name "DPRO Bakery Automation"
          git config user.email "actions@users.noreply.github.com"
          git add owner-wallet-mode.js owner.html .github/workflows/bakery-step35-r2.yml .github/workflows/bakery-step35-r3.yml
          git commit -m "STEP BAKERY-35-R3 fix charge toggle persistence"
          git push
