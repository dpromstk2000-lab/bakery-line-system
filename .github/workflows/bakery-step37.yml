name: One-time Bakery STEP 37 iPad QR pickup

on:
  push:
    paths:
      - '.github/workflows/bakery-step37.yml'

permissions:
  contents: write

jobs:
  apply-step37:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add iPad QR arrival and pickup UI
        shell: python
        run: |
          from pathlib import Path
          import base64
          import re

          js_path = Path("staff-qr-pickup.js")
          staff_path = Path("staff.html")
          workflow_path = Path(".github/workflows/bakery-step37.yml")

          js = base64.b64decode("").decode("utf-8")
          staff = staff_path.read_text(encoding="utf-8")
          tag = '<script src="./staff-qr-pickup.js?v=37"></script>'

          staff = re.sub(
              r'\s*<script src="\./staff-qr-pickup\.js\?v=[^"]+"></script>',
              '',
              staff
          )

          if '</body>' not in staff:
              raise SystemExit("staff.html body marker not found")

          staff = staff.replace(
              '</body>',
              '  ' + tag + '\n</body>',
              1
          )

          checks = {
              "step version": "STEP BAKERY-37" in js,
              "two step confirmation": "QRを読んだだけでは受け渡し済みにしません" in js,
              "pickup lookup": "/api/admin/pickup/lookup" in js,
              "pickup complete": "/api/admin/pickup/complete" in js,
              "camera": "getUserMedia" in js,
              "script tag": tag in staff,
              "no continuous observer": "MutationObserver" not in js,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit("validation failed: " + ", ".join(failed))

          js_path.write_text(js, encoding="utf-8")
          staff_path.write_text(staff, encoding="utf-8")
          workflow_path.unlink(missing_ok=True)

      - name: Bundle pinned QR decoder fallback
        run: |
          mkdir -p vendor
          curl --fail --location --retry 3 --retry-delay 2             "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"             --output vendor/jsQR-1.4.0.js
          curl --fail --location --retry 3 --retry-delay 2             "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/LICENSE"             --output vendor/jsQR-LICENSE.txt
          test "$(wc -c < vendor/jsQR-1.4.0.js)" -gt 200000
          grep -q "function jsQR" vendor/jsQR-1.4.0.js

      - name: JavaScript syntax check
        run: |
          node --check staff-qr-pickup.js
          node --check vendor/jsQR-1.4.0.js

      - name: Commit STEP BAKERY-37
        run: |
          git config user.name "DPRO Bakery Automation"
          git config user.email "actions@users.noreply.github.com"
          git add staff-qr-pickup.js staff.html vendor/jsQR-1.4.0.js vendor/jsQR-LICENSE.txt .github/workflows/bakery-step37.yml
          git commit -m "STEP BAKERY-37 add iPad QR arrival and pickup confirmation"
          git push
