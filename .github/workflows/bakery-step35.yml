name: One-time Bakery STEP 35 QR member mode

on:
  push:
    paths:
      - '.github/workflows/bakery-step35.yml'

permissions:
  contents: write

jobs:
  apply-step35:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add QR member and charge option display controllers
        shell: python
        run: |
          from pathlib import Path
          import base64
          import re

          owner_js_path = Path("owner-wallet-mode.js")
          wallet_js_path = Path("wallet-membership-mode.js")
          owner_path = Path("owner.html")
          wallet_path = Path("wallet.html")
          workflow_path = Path(".github/workflows/bakery-step35.yml")

          owner_js = base64.b64decode("").decode("utf-8")
          wallet_js = base64.b64decode("").decode("utf-8")
          owner = owner_path.read_text(encoding="utf-8")
          wallet = wallet_path.read_text(encoding="utf-8")

          owner_tag = '<script src="./owner-wallet-mode.js?v=35"></script>'
          wallet_tag = '<script src="./wallet-membership-mode.js?v=35"></script>'

          owner = re.sub(
              r'\s*<script src="\./owner-wallet-mode\.js\?v=[^"]+"></script>',
              '',
              owner
          )
          wallet = re.sub(
              r'\s*<script src="\./wallet-membership-mode\.js\?v=[^"]+"></script>',
              '',
              wallet
          )

          owner_marker = '<script src="./owner-catalog-link.js?v=32"></script>'
          if owner_marker in owner:
              owner = owner.replace(owner_marker, owner_marker + "\n  " + owner_tag, 1)
          elif '</body>' in owner:
              owner = owner.replace('</body>', '  ' + owner_tag + '\n</body>', 1)
          else:
              raise SystemExit("owner.html body marker not found")

          wallet_marker = '<script src="./wallet-product-thumbnails.js?v=34"></script>'
          if wallet_marker in wallet:
              wallet = wallet.replace(wallet_marker, wallet_marker + "\n  " + wallet_tag, 1)
          elif '</body>' in wallet:
              wallet = wallet.replace('</body>', '  ' + wallet_tag + '\n</body>', 1)
          else:
              raise SystemExit("wallet.html body marker not found")

          checks = {
              "owner step": "STEP BAKERY-35" in owner_js,
              "wallet step": "STEP BAKERY-35" in wallet_js,
              "wallet QR standard": "QR会員証は常に残します" in wallet_js,
              "no owner observer": "MutationObserver" not in owner_js,
              "no wallet observer": "MutationObserver" not in wallet_js,
              "owner tag": owner_tag in owner,
              "wallet tag": wallet_tag in wallet,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit("validation failed: " + ", ".join(failed))

          owner_js_path.write_text(owner_js, encoding="utf-8")
          wallet_js_path.write_text(wallet_js, encoding="utf-8")
          owner_path.write_text(owner, encoding="utf-8")
          wallet_path.write_text(wallet, encoding="utf-8")
          workflow_path.unlink(missing_ok=True)

      - name: JavaScript syntax check
        run: |
          node --check owner-wallet-mode.js
          node --check wallet-membership-mode.js

      - name: Commit STEP BAKERY-35
        run: |
          git config user.name "DPRO Bakery Automation"
          git config user.email "actions@users.noreply.github.com"
          git add owner-wallet-mode.js wallet-membership-mode.js owner.html wallet.html .github/workflows/bakery-step35.yml
          git commit -m "STEP BAKERY-35 standardize QR member and switch charge option"
          git push
