name: One-time Bakery wallet freeze fix 33-R1

on:
  push:
    paths:
      - '.github/workflows/bakery-wallet-freeze-fix.yml'

permissions:
  contents: write

jobs:
  fix-wallet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace limit script and refresh cache version
        shell: python
        run: |
          from pathlib import Path
          import base64

          js_path = Path("wallet-preorder-limit.js")
          wallet_path = Path("wallet.html")
          workflow_path = Path(".github/workflows/bakery-wallet-freeze-fix.yml")

          fixed_js = base64.b64decode("").decode("utf-8")
          wallet = wallet_path.read_text(encoding="utf-8")

          old_tags = [
              '<script src="./wallet-preorder-limit.js?v=33"></script>',
              '<script src="./wallet-preorder-limit.js?v=33-r1"></script>'
          ]
          new_tag = '<script src="./wallet-preorder-limit.js?v=33-r1"></script>'

          if old_tags[0] in wallet:
              wallet = wallet.replace(old_tags[0], new_tag, 1)
          elif old_tags[1] not in wallet:
              raise SystemExit("wallet script tag not found")

          checks = {
              "fixed version": "STEP BAKERY-33-R1" in fixed_js,
              "observer removed": "MutationObserver" not in fixed_js,
              "safe interval": "setInterval" in fixed_js,
              "wallet cache updated": new_tag in wallet,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit("validation failed: " + ", ".join(failed))

          js_path.write_text(fixed_js, encoding="utf-8")
          wallet_path.write_text(wallet, encoding="utf-8")
          workflow_path.unlink(missing_ok=True)

      - name: JavaScript syntax check
        run: node --check wallet-preorder-limit.js

      - name: Commit emergency fix
        run: |
          git config user.name "DPRO Bakery Automation"
          git config user.email "actions@users.noreply.github.com"
          git add wallet-preorder-limit.js wallet.html .github/workflows/bakery-wallet-freeze-fix.yml
          git commit -m "STEP BAKERY-33-R1 fix wallet page unresponsive loop"
          git push
