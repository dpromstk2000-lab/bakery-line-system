name: One-time Bakery STEP 38 HID scanner

on:
  push:
    paths:
      - '.github/workflows/bakery-step38.yml'

permissions:
  contents: write

jobs:
  apply-step38:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add automatic HID reader waiting mode
        shell: python
        run: |
          from pathlib import Path
          import base64
          import re

          js_path = Path("staff-hid-scanner.js")
          staff_path = Path("staff.html")
          workflow_path = Path(".github/workflows/bakery-step38.yml")

          js = base64.b64decode("").decode("utf-8")
          staff = staff_path.read_text(encoding="utf-8")

          tag = '<script src="./staff-hid-scanner.js?v=38"></script>'
          qr_tag = '<script src="./staff-qr-pickup.js?v=37"></script>'

          staff = re.sub(
              r'\s*<script src="\./staff-hid-scanner\.js\?v=[^"]+"></script>',
              '',
              staff
          )

          if qr_tag in staff:
              staff = staff.replace(
                  qr_tag,
                  qr_tag + "\n  " + tag,
                  1
              )
          elif '</body>' in staff:
              staff = staff.replace(
                  '</body>',
                  '  ' + tag + '\n</body>',
                  1
              )
          else:
              raise SystemExit("staff.html body marker not found")

          checks = {
              "step version": "STEP BAKERY-38" in js,
              "global key wait": "handleGlobalKeydown" in js,
              "enter suffix": 'key === "Enter"' in js,
              "tab suffix": 'key === "Tab"' in js,
              "speed guard": "MAX_KEY_INTERVAL_MS" in js,
              "duplicate guard": "DUPLICATE_COOLDOWN_MS" in js,
              "automatic lookup": 'button.click()' in js,
              "script order": (
                  qr_tag not in staff or
                  staff.index(qr_tag) < staff.index(tag)
              ),
              "no DOM observer": "MutationObserver" not in js,
          }

          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit(
                  "validation failed: " + ", ".join(failed)
              )

          js_path.write_text(js, encoding="utf-8")
          staff_path.write_text(staff, encoding="utf-8")
          workflow_path.unlink(missing_ok=True)

      - name: JavaScript syntax check
        run: node --check staff-hid-scanner.js

      - name: Commit STEP BAKERY-38
        run: |
          git config user.name "DPRO Bakery Automation"
          git config user.email "actions@users.noreply.github.com"
          git add staff-hid-scanner.js staff.html .github/workflows/bakery-step38.yml
          git commit -m "STEP BAKERY-38 add automatic Bluetooth HID reader mode"
          git push
