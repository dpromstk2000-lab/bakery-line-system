name: One-time Bakery STEP 36 catalog round trip

on:
  push:
    paths:
      - '.github/workflows/bakery-step36.yml'

permissions:
  contents: write

jobs:
  apply-step36:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add wallet catalog round-trip navigation
        shell: python
        run: |
          from pathlib import Path
          import base64
          import re

          js_path = Path("wallet-catalog-roundtrip.js")
          wallet_path = Path("wallet.html")
          workflow_path = Path(".github/workflows/bakery-step36.yml")
          js = base64.b64decode("").decode("utf-8")
          wallet = wallet_path.read_text(encoding="utf-8")
          tag = '<script src="./wallet-catalog-roundtrip.js?v=36"></script>'
          bridge = '<script src="./wallet-catalog-bridge.js?v=32"></script>'

          wallet = re.sub(r'\s*<script src="\./wallet-catalog-roundtrip\.js\?v=[^"]+"></script>', '', wallet)
          if bridge not in wallet:
              raise SystemExit("wallet catalog bridge tag not found")
          wallet = wallet.replace(bridge, tag + "\n  " + bridge, 1)

          checks = {
              "step version": "STEP BAKERY-36" in js,
              "draft save": "saveDraft()" in js,
              "quantity restore": "setQtyAtLeast" in js,
              "double-add prevention": "history.replaceState" in js,
              "no continuous DOM observer": "MutationObserver" not in js,
              "script before bridge": wallet.index(tag) < wallet.index(bridge),
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit("validation failed: " + ", ".join(failed))

          js_path.write_text(js, encoding="utf-8")
          wallet_path.write_text(wallet, encoding="utf-8")
          workflow_path.unlink(missing_ok=True)

      - name: JavaScript syntax check
        run: node --check wallet-catalog-roundtrip.js

      - name: Commit STEP BAKERY-36
        run: |
          git config user.name "DPRO Bakery Automation"
          git config user.email "actions@users.noreply.github.com"
          git add wallet-catalog-roundtrip.js wallet.html .github/workflows/bakery-step36.yml
          git commit -m "STEP BAKERY-36 add wallet catalog round-trip navigation"
          git push
