name: One-time Bakery STEP 37 R1 QR fix

on:
  push:
    paths:
      - '.github/workflows/bakery-step37-r1.yml'

permissions:
  contents: write

jobs:
  apply-qr-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add standard QR generator
        shell: python
        run: |
          from pathlib import Path
          import base64
          import re

          js_path = Path("wallet-qr-standard.js")
          wallet_path = Path("wallet.html")
          workflow_path = Path(".github/workflows/bakery-step37-r1.yml")

          js = base64.b64decode("").decode("utf-8")
          wallet = wallet_path.read_text(encoding="utf-8")

          library_tag = '<script src="./vendor/qrcode-generator-1.4.4.js"></script>'
          fix_tag = '<script src="./wallet-qr-standard.js?v=37-r1"></script>'

          wallet = re.sub(
              r'\s*<script src="\./vendor/qrcode-generator-[^"]+\.js"></script>',
              '',
              wallet
          )
          wallet = re.sub(
              r'\s*<script src="\./wallet-qr-standard\.js\?v=[^"]+"></script>',
              '',
              wallet
          )

          marker = '<script src="./wallet-membership-mode.js?v=35"></script>'
          marker_r = '<script src="./wallet-membership-mode.js?v=35-r1"></script>'

          if marker_r in wallet:
              wallet = wallet.replace(
                  marker_r,
                  marker_r + "\n  " + library_tag + "\n  " + fix_tag,
                  1
              )
          elif marker in wallet:
              wallet = wallet.replace(
                  marker,
                  marker + "\n  " + library_tag + "\n  " + fix_tag,
                  1
              )
          elif '</body>' in wallet:
              wallet = wallet.replace(
                  '</body>',
                  '  ' + library_tag + '\n  ' + fix_tag + '\n</body>',
                  1
              )
          else:
              raise SystemExit("wallet.html body marker not found")

          checks = {
              "step version": "STEP BAKERY-37-R1" in js,
              "standard generator": 'window.qrcode(0, "M")' in js,
              "quiet zone": "quietModules = 4" in js,
              "integer modules": "Math.floor" in js,
              "library tag": library_tag in wallet,
              "fix tag": fix_tag in wallet,
              "no continuous observer": "MutationObserver" not in js,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit("validation failed: " + ", ".join(failed))

          js_path.write_text(js, encoding="utf-8")
          wallet_path.write_text(wallet, encoding="utf-8")
          workflow_path.unlink(missing_ok=True)

      - name: Bundle pinned QR generator
        run: |
          mkdir -p vendor
          curl --fail --location --retry 4 --retry-delay 3             "https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"             --output vendor/qrcode-generator-1.4.4.js
          curl --fail --location --retry 4 --retry-delay 3             "https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/package.json"             --output vendor/qrcode-generator-1.4.4-package.json
          test "$(wc -c < vendor/qrcode-generator-1.4.4.js)" -gt 40000
          grep -q "var qrcode" vendor/qrcode-generator-1.4.4.js
          grep -q '"license"' vendor/qrcode-generator-1.4.4-package.json

      - name: JavaScript syntax check
        run: |
          node --check wallet-qr-standard.js
          node --check vendor/qrcode-generator-1.4.4.js

      - name: Commit STEP BAKERY-37-R1
        run: |
          git config user.name "DPRO Bakery Automation"
          git config user.email "actions@users.noreply.github.com"
          git add wallet-qr-standard.js wallet.html vendor/qrcode-generator-1.4.4.js vendor/qrcode-generator-1.4.4-package.json .github/workflows/bakery-step37-r1.yml
          git commit -m "STEP BAKERY-37-R1 replace unreadable member QR generator"
          git push
