name: One-time Bakery STEP 34 thumbnails

on:
  push:
    paths:
      - '.github/workflows/bakery-step34.yml'

permissions:
  contents: write

jobs:
  apply-step34:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add lightweight preorder thumbnails
        shell: python
        run: |
          from pathlib import Path
          import base64
          import re

          js_path = Path("wallet-product-thumbnails.js")
          wallet_path = Path("wallet.html")
          workflow_path = Path(".github/workflows/bakery-step34.yml")

          js = base64.b64decode("").decode("utf-8")
          wallet = wallet_path.read_text(encoding="utf-8")
          tag = '<script src="./wallet-product-thumbnails.js?v=34"></script>'

          wallet = re.sub(
              r'\s*<script src="\./wallet-product-thumbnails\.js\?v=[^"]+"></script>',
              '',
              wallet
          )

          marker = '<script src="./wallet-preorder-limit.js?v=33-r1"></script>'
          if marker in wallet:
              wallet = wallet.replace(marker, marker + "\n  " + tag, 1)
          elif '</body>' in wallet:
              wallet = wallet.replace('</body>', '  ' + tag + '\n</body>', 1)
          else:
              raise SystemExit("wallet.html body marker not found")

          checks = {
              "step version": "STEP BAKERY-34" in js,
              "lazy image": 'image.loading = "lazy"' in js,
              "async decode": 'image.decoding = "async"' in js,
              "no continuous DOM observer": "MutationObserver" not in js,
              "wallet tag": tag in wallet,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit("validation failed: " + ", ".join(failed))

          js_path.write_text(js, encoding="utf-8")
          wallet_path.write_text(wallet, encoding="utf-8")
          workflow_path.unlink(missing_ok=True)

      - name: JavaScript syntax check
        run: node --check wallet-product-thumbnails.js

      - name: Commit STEP BAKERY-34
        run: |
          git config user.name "DPRO Bakery Automation"
          git config user.email "actions@users.noreply.github.com"
          git add wallet-product-thumbnails.js wallet.html .github/workflows/bakery-step34.yml
          git commit -m "STEP BAKERY-34 add lightweight preorder thumbnails"
          git push
