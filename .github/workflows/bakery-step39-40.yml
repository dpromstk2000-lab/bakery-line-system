name: One-time Bakery STEP 39 and 40

on:
  push:
    paths:
      - '.github/workflows/bakery-step39-40.yml'

permissions:
  contents: write

jobs:
  apply-step39-40:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add final system check and live sync
        shell: python
        run: |
          from pathlib import Path
          import base64
          import re

          system_js = base64.b64decode("").decode("utf-8")
          live_js = base64.b64decode("").decode("utf-8")

          system_js_path = Path("system-check-final.js")
          live_js_path = Path("staff-live-sync.js")
          system_html_path = Path("system-check.html")
          staff_html_path = Path("staff.html")
          workflow_path = Path(".github/workflows/bakery-step39-40.yml")

          system_html = system_html_path.read_text(encoding="utf-8")
          staff_html = staff_html_path.read_text(encoding="utf-8")

          required_existing = [
              Path("vendor/qrcode-generator-1.4.4.js"),
              Path("vendor/jsQR-1.4.0.js"),
              Path("wallet-qr-standard.js"),
              Path("staff-qr-pickup.js"),
              Path("staff-hid-scanner.js"),
              Path("catalog.html"),
              Path("wallet.html"),
          ]
          missing = [str(p) for p in required_existing if not p.exists()]
          if missing:
              raise SystemExit(
                  "required existing files missing: " + ", ".join(missing)
              )

          qr_gen_tag = '<script src="./vendor/qrcode-generator-1.4.4.js"></script>'
          jsqr_tag = '<script src="./vendor/jsQR-1.4.0.js"></script>'
          final_tag = '<script src="./system-check-final.js?v=39"></script>'
          live_tag = '<script src="./staff-live-sync.js?v=40"></script>'

          system_html = re.sub(
              r'\s*<script src="\./system-check-final\.js\?v=[^"]+"></script>',
              '',
              system_html
          )
          system_html = re.sub(
              r'\s*<script src="\./vendor/qrcode-generator-1\.4\.4\.js"></script>',
              '',
              system_html
          )
          system_html = re.sub(
              r'\s*<script src="\./vendor/jsQR-1\.4\.0\.js"></script>',
              '',
              system_html
          )

          if '</body>' not in system_html:
              raise SystemExit("system-check.html body marker not found")

          system_html = system_html.replace(
              '</body>',
              '  ' + qr_gen_tag + '\n'
              '  ' + jsqr_tag + '\n'
              '  ' + final_tag + '\n'
              '</body>',
              1
          )

          staff_html = re.sub(
              r'\s*<script src="\./staff-live-sync\.js\?v=[^"]+"></script>',
              '',
              staff_html
          )

          hid_tag = '<script src="./staff-hid-scanner.js?v=38"></script>'
          if hid_tag in staff_html:
              staff_html = staff_html.replace(
                  hid_tag,
                  hid_tag + '\n  ' + live_tag,
                  1
              )
          elif '</body>' in staff_html:
              staff_html = staff_html.replace(
                  '</body>',
                  '  ' + live_tag + '\n</body>',
                  1
              )
          else:
              raise SystemExit("staff.html body marker not found")

          checks = {
              "step39 version": "STEP BAKERY-39" in system_js,
              "all_ok output": "all_ok" in system_js,
              "catalog api": "/api/public/catalog" in system_js,
              "qr round trip": "qrRoundTrip" in system_js,
              "camera check": "getUserMedia" in system_js,
              "hid check": "hid_reader_ready" in system_js,
              "step40 version": "STEP BAKERY-40" in live_js,
              "30 second refresh": "AUTO_REFRESH_MS = 30000" in live_js,
              "visibility refresh": "visibilitychange" in live_js,
              "conflict preflight": "preflightStatusChange" in live_js,
              "last update": "lastUpdatedAt" in live_js,
              "system tag": final_tag in system_html,
              "qr generator tag": qr_gen_tag in system_html,
              "jsqr tag": jsqr_tag in system_html,
              "live tag": live_tag in staff_html,
              "script order": (
                  hid_tag not in staff_html or
                  staff_html.index(hid_tag) < staff_html.index(live_tag)
              ),
              "no mutation observer system": "MutationObserver" not in system_js,
              "no mutation observer live": "MutationObserver" not in live_js,
          }

          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit(
                  "validation failed: " + ", ".join(failed)
              )

          system_js_path.write_text(system_js, encoding="utf-8")
          live_js_path.write_text(live_js, encoding="utf-8")
          system_html_path.write_text(system_html, encoding="utf-8")
          staff_html_path.write_text(staff_html, encoding="utf-8")
          workflow_path.unlink(missing_ok=True)

      - name: JavaScript syntax checks
        run: |
          node --check system-check-final.js
          node --check staff-live-sync.js

      - name: Static integration checks
        run: |
          grep -q 'system-check-final.js?v=39' system-check.html
          grep -q 'qrcode-generator-1.4.4.js' system-check.html
          grep -q 'jsQR-1.4.0.js' system-check.html
          grep -q 'staff-live-sync.js?v=40' staff.html
          grep -q 'staff-hid-scanner.js?v=38' staff.html
          test "$(wc -c < system-check-final.js)" -gt 15000
          test "$(wc -c < staff-live-sync.js)" -gt 12000

      - name: Commit STEP BAKERY-39 and 40
        run: |
          git config user.name "DPRO Bakery Automation"
          git config user.email "actions@users.noreply.github.com"
          git add system-check-final.js staff-live-sync.js system-check.html staff.html .github/workflows/bakery-step39-40.yml
          git commit -m "STEP BAKERY-39-40 final system check and multi-device live sync"
          git push
