<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>STEP BAKERY-33 カタログチェック</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#fff8ed;color:#29211b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.65}
    .wrap{width:min(900px,calc(100% - 24px));margin:20px auto 50px}.panel{background:#fff;border:1px solid #ead8c3;border-radius:24px;padding:22px;margin-bottom:14px;box-shadow:0 14px 40px rgba(88,48,19,.08)}
    h1{font-size:clamp(30px,6vw,50px);line-height:1;margin:0 0 12px}label{display:block;font-size:12px;font-weight:900;margin:8px 0 4px}
    input{width:100%;border:1px solid #dcbf9e;border-radius:14px;padding:12px;font-size:15px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button{border:0;border-radius:999px;background:#9a4e16;color:#fff;padding:12px 16px;font-weight:950;cursor:pointer;margin-top:14px}
    .result{border:1px solid #ead8c3;border-radius:16px;padding:12px;margin-top:10px;white-space:pre-wrap;font-weight:800}.ok{background:#edf9f2;color:#155b3e}.ng{background:#fff0f0;color:#8e2929}.info{background:#eef6ff;color:#1e4d83}
    a{color:#8a4515;font-weight:900;word-break:break-all}@media(max-width:650px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body><div class="wrap">
  <section class="panel">
    <h1>カタログ一括チェック</h1>
    <p>STEP BAKERY-33のカタログWorker、公開商品、公開ページURLを確認します。</p>
    <div class="grid">
      <div><label>カタログWorker</label><input id="api" value="https://dpro-bakery-catalog-api.dpromstk2000.workers.dev"></div>
      <div><label>店舗コード</label><input id="shop" value="bakery_demo"></div>
    </div>
    <button id="check" type="button">一括チェック</button>
  </section>
  <section class="panel"><h2>1. Worker health</h2><div id="health" class="result info">未実行</div></section>
  <section class="panel"><h2>2. 公開商品API</h2><div id="catalog" class="result info">未実行</div></section>
  <section class="panel"><h2>3. 公開ページ</h2><div id="url" class="result info">未実行</div></section>
</div>
<script>
const $=id=>document.getElementById(id);
const base=()=>$("api").value.trim().replace(/\/+$/,"");
function show(id,text,ok){$(id).textContent=text;$(id).className="result "+(ok?"ok":"ng")}
$("check").addEventListener("click",async()=>{
  const shop=$("shop").value.trim()||"bakery_demo";
  try{
    const r=await fetch(base()+"/api/health"),d=await r.json();
    show("health",JSON.stringify(d,null,2),r.ok&&d.ok&&String(d.version||"").includes("BAKERY-32"));
  }catch(e){show("health",e.message,false)}
  try{
    const r=await fetch(base()+"/api/public/catalog?shop_code="+encodeURIComponent(shop)),d=await r.json();
    const limited=(d.products||[]).filter(p=>Number(p.per_customer_daily_limit||0)>0).map(p=>({product_code:p.product_code,product_name:p.product_name,per_customer_daily_limit:p.per_customer_daily_limit}));
    show("catalog",JSON.stringify({ok:d.ok,shop:d.shop,product_count:d.count,categories:d.categories,customer_limited_products:limited},null,2),r.ok&&d.ok&&limited.length>0);
  }catch(e){show("catalog",e.message,false)}
  const u=new URL("./catalog.html",location.href);u.searchParams.set("shop_code",shop);u.searchParams.set("catalog_api",base());u.searchParams.set("api","https://dpro-bakery-wallet-api.dpromstk2000.workers.dev");
  $("url").innerHTML='<a href="'+u.toString()+'" target="_blank" rel="noopener">'+u.toString()+'</a>';
  $("url").className="result ok";
});
</script></body></html>
